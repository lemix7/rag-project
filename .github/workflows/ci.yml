name: CI

on:
  push:
    branches: [main, production-test]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: test_rag
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --cov=src/rag --cov-report=xml
        env:
          RAG_OPENAI_API_KEY: test-key

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v
        env:
          RAG_OPENAI_API_KEY: test-key
          RAG_VECTOR_STORE_TYPE: chroma
